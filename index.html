<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: #050510; font-family: sans-serif; }

    /* UI PANEL */
    #ui {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 14px;
    }

    #ui input {
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div id="ui">
  <label>
    <input type="checkbox" id="mouseToggle" checked>
    Enable Mouse Interaction
  </label>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.Camera();
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.PlaneGeometry(2, 2);

// mouse
let mouse = new THREE.Vector2(0, 0);
let useMouse = true;

document.getElementById("mouseToggle").addEventListener("change", e => {
  useMouse = e.target.checked;
});

window.addEventListener("mousemove", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// COLORS (glass style)
const material = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    resolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
    mouse: { value: mouse },
    useMouse: { value: 1.0 }
  },

  fragmentShader: `
    uniform float time;
    uniform vec2 resolution;
    uniform vec2 mouse;
    uniform float useMouse;

    float metaball(vec2 p, vec2 center) {
      float d = length(p - center);
      return 0.25 / (d * d);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / resolution;
      uv = uv * 2.0 - 1.0;

      // BLOBS (more of them)
      vec2 c1 = vec2(sin(time*0.8)*0.5, cos(time*0.6)*0.5);
      vec2 c2 = vec2(cos(time*1.1)*0.5, sin(time*0.9)*0.5);
      vec2 c3 = vec2(sin(time*0.5)*0.6, cos(time*0.7)*0.6);
      vec2 c4 = vec2(cos(time*0.3)*0.7, sin(time*0.4)*0.7);
      vec2 c5 = vec2(sin(time*1.3)*0.4, cos(time*1.0)*0.4);

      // optional mouse blob
      vec2 m = mouse * useMouse;

      float m1 = metaball(uv, c1);
      float m2 = metaball(uv, c2);
      float m3 = metaball(uv, c3);
      float m4 = metaball(uv, c4);
      float m5 = metaball(uv, c5);
      float mm = metaball(uv, m);

      float total = m1+m2+m3+m4+m5 + mm;

      // GLASS COLORS (soft gradients)
      vec3 col1 = vec3(0.4, 0.7, 1.0);
      vec3 col2 = vec3(0.7, 0.4, 1.0);
      vec3 col3 = vec3(0.3, 1.0, 0.8);

      vec3 color = (
        col1 * (m1+m4) +
        col2 * (m2+m5) +
        col3 * (m3+mm)
      ) / total;

      // GLASS SHADING
      float edge = smoothstep(0.8, 1.2, total);

      // highlight (fake reflection)
      float highlight = pow(edge, 8.0);

      // fresnel-like glow
      float glow = smoothstep(0.6, 1.5, total);

      vec3 finalColor = color * edge + highlight * 0.6 + glow * 0.2;

      gl_FragColor = vec4(finalColor, edge);
    }
  `
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// animation
function animate() {
  requestAnimationFrame(animate);
  material.uniforms.time.value += 0.01;
  material.uniforms.useMouse.value = useMouse ? 1.0 : 0.0;
  renderer.render(scene, camera);
}
animate();

// resize
window.addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  material.uniforms.resolution.value.set(innerWidth, innerHeight);
});
</script>

</body>
</html>
