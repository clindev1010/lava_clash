<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fluid White Blobs</title>
<style>
  body { margin: 0; overflow: hidden; background: #050510; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// --- CONFIG ---
const blobCount = 20; // fewer blobs, larger size
const blobs = [];

// --- BLOB CLASS ---
class Blob {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 1; // slower for big blobs
    this.vy = (Math.random() - 0.5) * 1;
    this.radius = Math.max(width, height) * (0.15 + Math.random() * 0.1); // large to cover page
  }
  move() {
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > width) this.vx *= -1;
    if(this.y < 0 || this.y > height) this.vy *= -1;
  }
}

// --- CREATE BLOBS ---
for(let i=0; i<blobCount; i++) blobs.push(new Blob());

// --- METABALL FUNCTION ---
function metaball(x, y) {
  let sum = 0;
  for(let b of blobs){
    const dx = x - b.x;
    const dy = y - b.y;
    sum += (b.radius*b.radius) / (dx*dx + dy*dy);
  }
  return sum;
}

// --- ANIMATION ---
function animate(){
  requestAnimationFrame(animate);
  ctx.clearRect(0,0,width,height);

  const imgData = ctx.createImageData(width, height);
  const data = imgData.data;

  for(let y=0; y<height; y+=2){
    for(let x=0; x<width; x+=2){
      const m = metaball(x, y);
      if(m > 1){
        const alpha = Math.min(255, m*200); // stronger alpha for big blobs
        const index = (y*width + x)*4;
        data[index] = 255;   // R
        data[index+1] = 255; // G
        data[index+2] = 255; // B
        data[index+3] = alpha; // A
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);

  for(let b of blobs) b.move();
}

animate();

// --- RESIZE ---
window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  // Increase radius on resize to still cover page
  for(let b of blobs){
    b.radius = Math.max(width, height) * (0.15 + Math.random() * 0.1);
  }
});
</script>
</body>
</html>
