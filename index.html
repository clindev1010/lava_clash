<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: #050510; font-family: sans-serif; }

    #ui {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="ui">
  <label><input type="checkbox" id="mouseToggle" checked> Mouse</label>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.Camera();
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.PlaneGeometry(2, 2);

// mouse
let mouse = new THREE.Vector2(0, 0);
let useMouse = true;

document.getElementById("mouseToggle").onchange = e => useMouse = e.target.checked;

window.addEventListener("mousemove", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// colors (INSIDE ONLY)
const color1 = new THREE.Vector3(0.3, 0.7, 1.0);
const color2 = new THREE.Vector3(0.8, 0.4, 1.0);
const color3 = new THREE.Vector3(0.3, 1.0, 0.7);

const material = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    resolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
    mouse: { value: mouse },
    useMouse: { value: 1.0 }
  },

  fragmentShader: `
    uniform float time;
    uniform vec2 resolution;
    uniform vec2 mouse;
    uniform float useMouse;

    float metaball(vec2 p, vec2 c){
      float d = length(p - c);
      return 0.18 / (d*d);
    }

    void main(){
      vec2 uv = gl_FragCoord.xy / resolution;
      uv = uv * 2.0 - 1.0;

      float total = 0.0;
      vec3 col = vec3(0.0);

      // MULTIPLE BLOBS (spread)
      for(int i=0;i<10;i++){
        float fi = float(i);

        float angle = fi * 2.4;
        float radius = 0.4 + 0.4*sin(fi*3.1 + time*0.5);

        vec2 center = vec2(
          cos(angle + time*0.3*fi) * radius,
          sin(angle + time*0.25*fi) * radius
        );

        float m = metaball(uv, center);

        total += m;

        if(mod(fi,3.0)==0.0) col += vec3(0.3,0.7,1.0)*m;
        else if(mod(fi,3.0)==1.0) col += vec3(0.8,0.4,1.0)*m;
        else col += vec3(0.3,1.0,0.7)*m;
      }

      // mouse blob (optional)
      if(useMouse > 0.5){
        float mm = metaball(uv, mouse);
        total += mm;
        col += vec3(1.0,1.0,1.0)*mm;
      }

      // NORMALIZE COLOR
      col /= total;

      // 🔥 KEY CHANGE: HARD THRESHOLD
      float shape = smoothstep(1.2, 1.4, total);

      // sharp edge keeps blobs separate
      float edge = smoothstep(1.1, 1.3, total);

      // GLASS LOOK
      float highlight = pow(edge, 12.0);
      float glow = smoothstep(1.0, 1.6, total);

      vec3 finalColor = col * shape + highlight * 0.6;

      // 🚫 IMPORTANT: background stays clean
      gl_FragColor = vec4(finalColor, shape);
    }
  `
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// animate
function animate(){
  requestAnimationFrame(animate);
  material.uniforms.time.value += 0.01;
  material.uniforms.useMouse.value = useMouse ? 1.0 : 0.0;
  renderer.render(scene, camera);
}
animate();

// resize
window.addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  material.uniforms.resolution.value.set(innerWidth, innerHeight);
});
</script>

</body>
</html>
