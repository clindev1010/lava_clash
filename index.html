<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fluid Blobs</title>
<style>
  body { margin: 0; overflow: hidden; background: #050510; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// --- CONFIG ---
const blobCount = 30;
const blobs = [];

// --- BLOB CLASS ---
class Blob {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.radius = 50 + Math.random() * 30;
    this.color = `hsl(${Math.random()*360}, 80%, 60%)`;
  }
  move() {
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > width) this.vx *= -1;
    if(this.y < 0 || this.y > height) this.vy *= -1;
  }
}

// --- CREATE BLOBS ---
for(let i=0; i<blobCount; i++) blobs.push(new Blob());

// --- METABALL FUNCTION ---
function metaball(x, y) {
  let sum = 0;
  for(let b of blobs){
    const dx = x - b.x;
    const dy = y - b.y;
    sum += (b.radius*b.radius) / (dx*dx + dy*dy);
  }
  return sum;
}

// --- ANIMATION ---
function animate(){
  requestAnimationFrame(animate);
  ctx.clearRect(0,0,width,height);

  // Draw metaballs
  const imgData = ctx.createImageData(width, height);
  const data = imgData.data;

  for(let y=0; y<height; y+=2){
    for(let x=0; x<width; x+=2){
      const m = metaball(x, y);
      if(m > 1){
        const color = Math.min(255, m*100);
        const index = (y*width + x)*4;
        data[index] = color;       // Red
        data[index+1] = color*0.8; // Green
        data[index+2] = 255;       // Blue
        data[index+3] = Math.min(255, m*150); // Alpha
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);

  // Move blobs
  for(let b of blobs) b.move();
}

animate();

// --- RESIZE HANDLING ---
window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});
</script>
</body>
</html>
