<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.Camera();
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.PlaneGeometry(2, 2);

// 👉 CHANGE COLORS HERE
const colors = [
  new THREE.Vector3(1.0, 0.2, 0.3), // red
  new THREE.Vector3(0.2, 0.6, 1.0), // blue
  new THREE.Vector3(0.3, 1.0, 0.5)  // green
];

const material = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    resolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
    color1: { value: colors[0] },
    color2: { value: colors[1] },
    color3: { value: colors[2] }
  },

  fragmentShader: `
    uniform float time;
    uniform vec2 resolution;
    uniform vec3 color1;
    uniform vec3 color2;
    uniform vec3 color3;

    float metaball(vec2 p, vec2 center) {
      float d = length(p - center);
      return 0.15 / (d * d);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / resolution;
      uv = uv * 2.0 - 1.0;

      // animated blob positions
      vec2 c1 = vec2(sin(time*0.8)*0.5, cos(time*0.6)*0.5);
      vec2 c2 = vec2(cos(time*1.1)*0.5, sin(time*0.9)*0.5);
      vec2 c3 = vec2(sin(time*0.5)*0.6, cos(time*0.7)*0.6);

      float m1 = metaball(uv, c1);
      float m2 = metaball(uv, c2);
      float m3 = metaball(uv, c3);

      float total = m1 + m2 + m3;

      // COLOR MIXING
      vec3 color = (
        color1 * m1 +
        color2 * m2 +
        color3 * m3
      ) / total;

      // smooth edge
      float mask = smoothstep(0.8, 1.2, total);

      gl_FragColor = vec4(color * mask, 1.0);
    }
  `
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// animation
function animate() {
  requestAnimationFrame(animate);
  material.uniforms.time.value += 0.01;
  renderer.render(scene, camera);
}
animate();

// resize
window.addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  material.uniforms.resolution.value.set(innerWidth, innerHeight);
});
</script>

</body>
</html>
