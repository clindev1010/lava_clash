<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smooth White Fluid Blobs</title>
<style>
  body { margin: 0; overflow: hidden; background: #050510; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// --- CONFIG ---
const blobCount = 20; // fewer blobs for large smooth shapes
const blobs = [];

// --- BLOB CLASS ---
class Blob {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = (Math.random() - 0.5) * 1.5;
    this.radius = Math.max(width, height) * (0.15 + Math.random() * 0.05); // large blobs
  }
  move() {
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > width) this.vx *= -1;
    if(this.y < 0 || this.y > height) this.vy *= -1;
  }
}

// --- CREATE BLOBS ---
for(let i=0; i<blobCount; i++) blobs.push(new Blob());

// --- ANIMATION ---
function animate() {
  requestAnimationFrame(animate);
  ctx.clearRect(0, 0, width, height);

  // Draw blobs with additive blending
  ctx.globalCompositeOperation = 'lighter';
  for(let b of blobs){
    const gradient = ctx.createRadialGradient(b.x, b.y, b.radius*0.3, b.x, b.y, b.radius);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  for(let b of blobs) b.move();
}

animate();

// --- RESIZE ---
window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  for(let b of blobs){
    b.radius = Math.max(width, height) * (0.15 + Math.random() * 0.05);
  }
});
</script>
</body>
</html>
