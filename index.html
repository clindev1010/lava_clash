<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// PARTICLES
const count = 8000;
const positions = new Float32Array(count * 3);

for (let i = 0; i < count * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 2;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

// MOUSE
let mouse = new THREE.Vector2(0, 0);
window.addEventListener("mousemove", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// SHADER (fluid + merging)
const material = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,

  uniforms: {
    time: { value: 0 },
    mouse: { value: mouse }
  },

  vertexShader: `
    uniform float time;
    uniform vec2 mouse;

    float noise(vec3 p){
      return sin(p.x)*sin(p.y)*sin(p.z);
    }

    void main() {
      vec3 pos = position;

      // FLUID MOTION
      float n = noise(pos + time);
      pos += normalize(pos) * n * 0.3;

      // MOUSE FORCE (attraction)
      vec3 m = vec3(mouse * 2.0, 0.0);
      float dist = length(pos.xy - m.xy);
      pos.xy += (m.xy - pos.xy) * 0.02 / (dist + 0.1);

      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);

      // size grows when near center (merging illusion)
      gl_PointSize = 4.0 + 6.0 / (dist + 0.2);
    }
  `,

  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));

      // soft circle
      float alpha = smoothstep(0.5, 0.0, d);

      // metaball-like intensity
      float intensity = 1.0 - d * 2.0;

      vec3 color = vec3(0.1, 0.6, 1.0) * intensity;

      gl_FragColor = vec4(color, alpha);
    }
  `
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  material.uniforms.time.value += 0.01;

  particles.rotation.y += 0.001;

  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
