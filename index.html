<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Liquid Metaball Bubbles</title>
<style>
  body { margin: 0; overflow: hidden; background: #050510; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// --- CONFIG ---
const bubbleCount = 20;
const bubbles = [];
const minRadius = 40;
const maxRadius = 100;

// --- CREATE BUBBLES ---
for(let i=0; i<bubbleCount; i++){
  bubbles.push({
    x: Math.random() * width,
    y: Math.random() * height,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2,
    r: minRadius + Math.random()*(maxRadius-minRadius)
  });
}

// --- DRAW METABALLS ---
function draw(){
  ctx.clearRect(0,0,width,height);

  // draw each bubble with radial gradient
  for(let i=0;i<bubbleCount;i++){
    const b = bubbles[i];
    const gradient = ctx.createRadialGradient(b.x, b.y, b.r*0.2, b.x, b.y, b.r);
    gradient.addColorStop(0, 'rgba(255,255,255,0.9)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
  }
}

// --- SIMPLE METABALL MERGING ---
function mergeBubbles(){
  // basic soft merging via additive alpha blending is handled by canvas
  // For more realistic metaball merging, pixel shaders are required
}

// --- ANIMATION ---
function animate(){
  requestAnimationFrame(animate);
  draw();

  // move bubbles
  for(let b of bubbles){
    b.x += b.vx;
    b.y += b.vy;

    // bounce off walls
    if(b.x < 0 || b.x > width) b.vx *= -1;
    if(b.y < 0 || b.y > height) b.vy *= -1;
  }
}

animate();

// --- RESIZE ---
window.addEventListener('resize', ()=>{
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

</script>
</body>
</html>
